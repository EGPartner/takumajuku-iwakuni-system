<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欠席連絡 - タクマ塾岩国校</title>
<style>
  :root{
    --bg:#F6F5F0; --surface:#FFFFFF; --border:#DEDBCF; --border-strong:#C7C3B4;
    --text-primary:#1E241F; --text-secondary:#5B6058; --text-muted:#8B8F84;
    --accent:#1F6F4A; --accent-dark:#154D33; --danger:#B3413B; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Hiragino Sans","Yu Gothic",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 22px;max-width:420px;width:100%;}
  h1{font-size:18px;margin:0 0 6px;}
  p.sub{font-size:13px;color:var(--text-secondary);margin:0 0 20px;}
  label{font-size:13px;color:var(--text-secondary);display:block;margin-bottom:5px;}
  input[type=text],input[type=date],select,textarea{width:100%;padding:10px 11px;border:1px solid var(--border-strong);border-radius:8px;font-size:16px;background:var(--surface);color:var(--text-primary);font-family:inherit;}
  textarea{resize:vertical;}
  .field{margin-bottom:16px;}
  .reason-group{display:flex;gap:8px;flex-wrap:wrap;}
  .reason-btn{flex:1 1 auto;padding:10px 8px;border:1px solid var(--border-strong);border-radius:8px;background:var(--surface);font-size:14px;cursor:pointer;text-align:center;color:var(--text-primary);}
  .reason-btn.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
  button.submit{width:100%;padding:13px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;}
  button.submit:disabled{opacity:0.6;cursor:default;}
  .status{font-size:13px;margin-top:12px;text-align:center;min-height:18px;}
  .success{text-align:center;padding:20px 0;}
  .success .icon{font-size:40px;margin-bottom:10px;}
</style>
</head>
<body>
<div class="card" id="form-card">
  <h1>欠席連絡</h1>
  <p class="sub">タクマ塾岩国校の練習を欠席する場合、こちらからご連絡ください。</p>

  <div class="field">
    <label for="f-name">選手の氏名(姓名)</label>
    <input type="text" id="f-name" placeholder="例: 山田 蓮">
  </div>
  <div class="field">
    <label for="f-date">欠席日</label>
    <input type="date" id="f-date">
  </div>
  <div class="field">
    <label>理由</label>
    <div class="reason-group" id="reason-group">
      <button type="button" class="reason-btn" data-reason="体調不良">体調不良</button>
      <button type="button" class="reason-btn" data-reason="私用">私用</button>
      <button type="button" class="reason-btn" data-reason="その他">その他</button>
    </div>
  </div>
  <div class="field">
    <label for="f-note">備考(任意)</label>
    <textarea id="f-note" rows="3" placeholder="伝えておきたいことがあれば"></textarea>
  </div>

  <button type="button" class="submit" id="btn-submit">送信する</button>
  <p class="status" id="form-status"></p>
</div>

<div class="card" id="success-card" style="display:none;">
  <div class="success">
    <div class="icon">✓</div>
    <h1>連絡を受け付けました</h1>
    <p class="sub" style="margin-bottom:0;">ご連絡ありがとうございました。</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDKTuN49WGP1pFobS6rS_RwDnDvzJe1h00",
  authDomain: "takuma-juku-iwakuni.firebaseapp.com",
  projectId: "takuma-juku-iwakuni",
  storageBucket: "takuma-juku-iwakuni.firebasestorage.app",
  messagingSenderId: "1065956673618",
  appId: "1:1065956673618:web:e765409502a9b87031b78b"
};
const ACADEMY_ID = 'takuma-juku-iwakuni';

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const absenceRef = db.collection('academies').doc(ACADEMY_ID).collection('absenceReports');

let selectedReason = null;

document.querySelectorAll('.reason-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedReason = btn.dataset.reason;
  });
});

function todayStr(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
document.getElementById('f-date').value = todayStr();
document.getElementById('f-date').min = todayStr();

async function ensureSignedIn(){
  if (auth.currentUser) return auth.currentUser;
  const cred = await auth.signInAnonymously();
  return cred.user;
}

document.getElementById('btn-submit').addEventListener('click', async () => {
  const statusEl = document.getElementById('form-status');
  const btn = document.getElementById('btn-submit');
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-date').value;
  const note = document.getElementById('f-note').value.trim();

  if (!name){ statusEl.style.color = 'var(--danger)'; statusEl.textContent = '選手の氏名を入力してください。'; return; }
  if (!date){ statusEl.style.color = 'var(--danger)'; statusEl.textContent = '欠席日を選択してください。'; return; }
  if (!selectedReason){ statusEl.style.color = 'var(--danger)'; statusEl.textContent = '理由を選択してください。'; return; }

  btn.disabled = true;
  statusEl.style.color = 'var(--text-secondary)';
  statusEl.textContent = '送信しています…';

  try {
    await ensureSignedIn();
    await absenceRef.add({
      studentName: name,
      absenceDate: date,
      reason: selectedReason,
      note: note,
      status: 'new',
      submittedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('success-card').style.display = 'block';
  } catch(err){
    console.error(err);
    statusEl.style.color = 'var(--danger)';
    statusEl.textContent = '送信に失敗しました: ' + (err && err.message ? err.message : String(err));
    btn.disabled = false;
  }
});
</script>
</body>
</html>
